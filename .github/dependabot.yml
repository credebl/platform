# .github/dependabot.yml

version: 2

updates:
  # =========================
  # pnpm Dependencies (via npm ecosystem)
  # =========================
  - package-ecosystem: "npm"
    directory: "/"              # or "/client" if package.json is inside a subfolder
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10

    groups:
      # 1) All patch updates in one PR
      patch-updates:
        patterns:
          - "*"
        update-types:
          - "patch"

      # 2) All minor updates in one PR
      minor-updates:
        patterns:
          - "*"
        update-types:
          - "minor"

    allow:
      - dependency-type: "all"

    labels:
      - "dependencies"
      - "pnpm"

    commit-message:
      prefix: "chore"
      include: "scope"


  # =========================
  # GitHub Actions
  # =========================
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # 1) All patch updates in one PR
      patch-actions:
        patterns:
          - "*"
        update-types:
          - "patch"

      # 2) All minor updates in one PR
      minor-actions:
        patterns:
          - "*"
        update-types:
          - "minor"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"


  # =========================
  # Docker
  # =========================
  - package-ecosystem: "docker"
    directories:
      - "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # 1) All patch‑style updates in one PR
      patch-docker:
        patterns:
          - "*"
        update-types:
          - "patch"

      # 2) All minor‑style updates in one PR
      minor-docker:
        patterns:
          - "*"
        update-types:
          - "minor"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "build"


  # =========================
  # Docker Compose
  # =========================
  - package-ecosystem: "docker-compose"
    directories:
      - "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    groups:
      # 1) All patch‑style updates in one PR
      patch-docker-compose:
        patterns:
          - "*"
        update-types:
          - "patch"

      # 2) All minor‑style updates in one PR
      minor-docker-compose:
        patterns:
          - "*"
        update-types:
          - "minor"

    labels:
      - "dependencies"
      - "docker"

    commit-message:
      prefix: "build"