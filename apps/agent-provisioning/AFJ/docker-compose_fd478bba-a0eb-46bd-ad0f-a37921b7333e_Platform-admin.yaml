version: '3'

services:
  agent:
    image: afj-0.4.2:latest

    container_name: fd478bba-a0eb-46bd-ad0f-a37921b7333e_Platform-admin
    restart: always
    environment:
      AFJ_REST_LOG_LEVEL: 1
    ports:
     - 9018:9018
     - 8018:8018
   
    volumes: 
      - ./agent-config/fd478bba-a0eb-46bd-ad0f-a37921b7333e_Platform-admin.json:/config.json   
      
    command: --auto-accept-connections --config /config.json
      
volumes:
  pgdata:
  agent-indy_client:
  agent-tmp:
